version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "security"]
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    groups:
      actions-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    # ponytail: codeql-action v3 → v4 changed the SARIF summary config format
    # ponytail: (`category` field); v3 workflows don't run against v4 analyze.
    # ponytail: Skip major bumps here; land v4 together with the workflow-config fix.
    ignore:
      - dependency-name: "github/codeql-action"
        update-types: ["version-update:semver-major"]
